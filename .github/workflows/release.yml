name: Release

on:
  push:
    tags:
      - "v*" # triggers on v1.0.0, v1.1.0, etc.

permissions:
  contents: write # needed to create GitHub Releases

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      # ── Rust ────────────────────────────────────────────────
      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Build & publish ─────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys — add these as GitHub repo secrets.
          # Generate with: npx tauri signer generate -w ~/.tauri/sparrow-downloader.key
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Sparrow Downloader ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download and install Sparrow Downloader ${{ github.ref_name }}.
          releaseDraft: false # review before publishing
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          updaterJsonPreferNsis: true # use NSIS (.exe) for Windows update artifact
